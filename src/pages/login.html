<html lang="pt-BR">
<head>

    <title>Entrar - Loja Digital</title>
    <link rel="stylesheet" href="../styles/global.css">

</head>
<body>
    <header>
        <nav>

                <img 
                    src="../assets/logo.svg" 
                    alt="Logo da Loja Digital">

                </span>
            </a>
        </nav>

   <main>

        <div class="inputs">
            <div>
               <label>Email *</label>
               <p>
               <input type="email" 
                      placeholder="Ex: seunome@email.com"
                />
            </div>
            <div>
                <label>Senha *</label>
                <input type="password"
                       placeholder="Ex: 12346"
                       required
                    />
            </div>
        </div>
        <span>
            <a href="#">Esqueci minha senha</a><p></p>
        </span>        
        <button>Acessar Conta</button>
        <div class="othes">
             <span> Ou faça login com </span>
        <nav>
            <ul>
                <li>
                    <a href="#">
                        <img 
                        src="../assets/gmail.svg" 
                        alt="icone do gmail "
                        />
                    </a>
                </li>
                <li>
                 <a href="#">
                    <img src="../assets/facebook.svg" 
                         alt="icone facebook"
                         />
                 </a>
                </li>
            </ul>
          </nav>
        </div>       
    </form>
   </main>
